name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # Instala as dependências da RAIZ (onde está o Playwright)
    - name: Install Test Dependencies
      run: yarn install

    # Instala as dependências da API
    - name: Install API Dependencies
      run: cd apps/api && yarn install

    # Instala as dependências do FRONTEND
    - name: Install Web Dependencies
      run: cd apps/web && yarn install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: 📊 Generate Test Summary
      uses: mikepenz/action-junit-report@v4
      if: always() # Roda sempre, independente de erro ou sucesso
      with:
          report_paths: 'results.xml'    # O arquivo gerado pelo config do Playwright
          detailed_summary: true         # Cria a tabela detalhada que você viu
          include_passed: true           # Mostra os testes que passaram também
          check_name: 'Relatório Técnico E2E' 

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
